<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body id="page-top" style="padding-top: 0;">
  
  <!-- Minimal Header - No Nav Bar, No Background Image -->
  <header style="background-color: #f8f9fa; padding: 40px 0; margin-bottom: 30px;">
    <div class="container">
      <h1 style="margin: 0; color: #333;">{{ page.title }}</h1>
      {% if page.descriptor %}
      <p style="color: #666; margin-top: 10px; font-size: 18px;">{{ page.descriptor }}</p>
      {% endif %}
    </div>
  </header>
  
  <!-- Primary Content Column -->
  <main class="page-main">
    <div class="content-column">
      {{ content }}
    </div>
  </main>
  
  <!-- Minimal Footer -->
  <footer style="background-color: #f8f9fa; padding: 30px 0; margin-top: 50px; text-align: center;">
    <div class="container">
      <p style="margin: 0; color: #666;">ROB 456 - Cognitive Robotics Portfolio | Oregon State University</p>
    </div>
  </footer>
  
  {% include scripts.html %}
</body>
</html>
